<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - Gaiyang Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --edit-gradient: linear-gradient(135deg, #38b2ac 0%, #319795 100%);
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Poppins', 'Kanit', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-header {
            background: var(--primary-gradient);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .form-header h2 { margin: 0; font-size: 1.8rem; }
        .form-header p { opacity: 0.8; margin: 5px 0 0; font-size: 0.9rem; }

        form { padding: 30px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #38b2ac;
            background-color: #f8fafc;
        }

        textarea { resize: vertical; min-height: 80px; }

        .btn-update {
            width: 100%;
            padding: 15px;
            background: var(--edit-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 178, 172, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #718096;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover { color: #667eea; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>📝 แก้ไขข้อมูลสินค้า</h2>
            <p>ปรับปรุงรายละเอียดสินค้าให้ถูกต้อง</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>ชื่อสินค้า</label>
                <input type="text" name="product_name" value="{{ product['product_name'] }}" required>
            </div>

            <div class="form-group">
                <label>รายละเอียด</label>
                <textarea name="product_description" placeholder="บรรยายความอร่อยตรงนี้..."></textarea>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>ราคา (บาท)</label>
                    <input type="number" step="0.01" name="product_price" value="{{ product['product_price'] }}" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>สต็อก (ชิ้น)</label>
                    <input type="number" name="product_stock" value="{{ product['product_stock'] }}" required>
                </div>
            </div>

            <div class="form-group">
                <label>URL รูปภาพสินค้า</label>
                <input type="text" name="product_image_url" value="{{ product['product_image_url'] }}">
            </div>

            <button type="submit" class="btn-update">💾 อัปเดตข้อมูล</button>
            
            <a href="/" class="back-link">⬅ ยกเลิกและกลับหน้าหลัก</a>
        </form>
    </div>

</body>
</html>
