<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Made to Order Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-color: #f0f2f5;
        }
        body { font-family: 'Poppins', 'Kanit', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-container { width: 100%; max-width: 1000px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { background: var(--primary-gradient); padding: 40px 20px; text-align: center; color: white; }
        .header h1 { margin: 0; font-size: 2.5rem; }
        .header p { opacity: 0.9; margin: 5px 0 0; }
        .nav-bar { padding: 15px 30px; border-bottom: 1px solid #eee; display: flex; gap: 20px; }
        .nav-bar a { text-decoration: none; color: #555; font-weight: 600; font-size: 0.9rem; }
        .nav-bar a.active { color: #667eea; }
        .content { padding: 30px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 15px; border: 1px solid #eee; overflow: hidden; transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
        .product-image { width: 100%; height: 150px; object-fit: cover; }
        .product-details { padding: 15px; }
        .product-name { font-size: 1.1rem; font-weight: 600; color: #4a5568; margin: 0; }
        .category-tag { display: inline-block; background: #667eea; color: white; font-size: 0.7rem; padding: 2px 10px; border-radius: 10px; margin: 5px 0; }
        .price { font-size: 1.2rem; font-weight: bold; color: #2d3748; margin: 10px 0; }
        .stock-info { background: #f7fafc; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; color: #718096; margin-bottom: 15px; }
        .btn { flex: 1; padding: 8px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem; color: white; text-align: center; text-decoration: none; display: inline-block; }
        .btn-edit { background-color: #38b2ac; }
        .btn-delete { background-color: #f56565; }
        .button-group { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>🍳 Food Made to Order Shop</h1>
            <p>Delicious Meals Prepared Just for You</p>
        </div>
        <div class="nav-bar">
            <a href="/" class="active">📦 Menu List</a>
            <a href="/add">➕ Add Menu</a>
        </div>
        <div class="content">
            <h2>Our Menu</h2>
            <div class="product-grid">
                {% for product in products %}
                <div class="product-card">
                    <img src="{{ product['product_image_url'] }}" class="product-image" alt="Food">
                    <div class="product-details">
                        <p class="product-name">{{ product['product_name'] }}</p>
                        <span class="category-tag">อาหารตามสั่ง</span>
                        <div class="price">฿{{ product['product_price'] }}</div>
                        <div class="stock-info">📦 {{ product['product_stock'] }} items available</div>
                        <div class="button-group">
                            <a href="{{ url_for('edit_product', id=product['product_id']) }}" class="btn btn-edit">✎ Edit</a>
                            <form action="{{ url_for('delete_product', id=product['product_id']) }}" method="POST" style="flex:1;">
                                <button type="submit" class="btn btn-delete" onclick="return confirm('Delete this menu?')">🗑 Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
